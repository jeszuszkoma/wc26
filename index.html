<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#04060c">
  <title>WC26 // PREDICTION ARENA</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <div id="app">
    <header>
      <div class="title-row">
        <h1><span class="glow">WC</span><span class="yr">26</span> // ARENA</h1>
        <button id="player-chip">SET NAME</button>
      </div>
      <nav>
        <button class="tab active" data-view="matches">Matches</button>
        <button class="tab" data-view="groups">Groups</button>
        <button class="tab" data-view="knockout">Knockout</button>
        <button class="tab" data-view="trophy">Trophy</button>
        <button class="tab" data-view="board">Board</button>
      </nav>
      <div id="mode-banner" hidden>LOCAL MODE — votes stay on this device. Configure Supabase to play with friends.</div>
    </header>

    <main id="view"></main>
  </div>

  <div id="name-modal" hidden>
    <div class="modal-box">
      <h2>ENTER PLAYER TAG</h2>
      <input id="name-input" maxlength="20" placeholder="e.g. Márk" autocomplete="off">
      <button id="name-save">JOIN ARENA</button>
    </div>
  </div>

  <div id="toast"></div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
